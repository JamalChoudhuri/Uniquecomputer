<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Certificate Dynamic Overlay Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf.js for High Quality PDF Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* অরিজিনাল সনদের ভেতরের নাম ও বিষয়ের বিবরণ (নিখুঁত ইটালিক ব্ল্যাক) */
        .cert-text {
            font-family: 'Times New Roman', Times, 'Kalpurush', serif;
            color: #000000; /* নিখুঁত কালো রঙ */
            font-style: italic;
            font-weight: bold;
        }
        
        /* ওপরের আইডি ও রেজিস্ট্রেশন নম্বর (গাঢ় ক্ষয়েরী/Deep Maroon কালার) */
        .cert-number {
            font-family: 'Times New Roman', Times, 'Kalpurush', sans-serif;
            color: #701c1c; /* অরিজিনাল সনদের মতো ক্ষয়েরী রঙ */
            font-weight: bold;
            letter-spacing: 0.02em;
        }

        /* জিপিএ ও রেজাল্ট প্রকাশের তারিখ (নরমাল টাইপফেস স্টাইল) */
        .cert-normal {
            font-family: 'Times New Roman', Times, serif;
            color: #000000;
            font-weight: bold;
            font-style: normal;
        }

        /* A4 Landscape Standard প্রিসিশন সাইজ */
        #certificateContainer {
            width: 1123px;
            height: 794px;
            position: relative;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 p-6 flex flex-col items-center">

    <header class="mb-6 text-center">
        <h1 class="text-2xl font-bold text-amber-400">HSC Certificate Dynamic Data Generator & PDF Exporter</h1>
        <p class="text-xs text-slate-400 mt-1">ক্ষয়েরী কালার ও নিখুঁত ফন্ট স্টাইল ফিক্সড—লাইন অনুযায়ী হুবহু ম্যাচিং</p>
    </header>

    <div class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
        
        <!-- বাম পাশে: ডাটা এন্ট্রি প্যানেল -->
        <div class="lg:col-span-4 bg-slate-800 p-5 rounded-xl border border-slate-700 space-y-4 shadow-xl">
            <h2 class="text-base font-bold text-amber-400 border-b border-slate-700 pb-2">১. ডাটা এন্ট্রি প্যানেল</h2>
            
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">অন্য টেমপ্লেট পরিবর্তন করতে চাইলে (.jpg)</label>
                    <input type="file" id="bgUploader" accept="image/*" class="w-full text-xs bg-slate-700 p-1.5 rounded" onchange="loadBackground(event)">
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-slate-400">Serial No. DBHC</label>
                        <input type="text" id="inSerial" value="8119907" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400">Registration No.</label>
                        <input type="text" id="inRegNo" value="1310393961 / 2016" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                    </div>
                </div>

                <div>
                    <label class="block text-xs text-slate-400">DBCHC Number</label>
                    <input type="text" id="inDbchc" value="18224107" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                </div>

                <div>
                    <label class="block text-xs text-slate-400">Student Name (This is to Certify that)</label>
                    <input type="text" id="inName" value="Jebunnesa Jerin" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-slate-400">Father's Name (Son/Daughter of)</label>
                        <input type="text" id="inFather" value="Md. Jamal Khan" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400">Mother's Name (and)</label>
                        <input type="text" id="inMother" value="Munni Khanam" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                    </div>
                </div>

                <div>
                    <label class="block text-xs text-slate-400">College Name (of)</label>
                    <input type="text" id="inCollege" value="Govt. Sarda Sundari Mohila College" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-slate-400">Bearing Roll No.</label>
                        <input type="text" id="inRoll" value="167932" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400">Center Name (No.)</label>
                        <input type="text" id="inCenter" value="Faridpur" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-slate-400">Group Name</label>
                        <input type="text" id="inGroup" value="Science" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400">G.P.A Secured</label>
                        <input type="text" id="inGpa" value="2.75" class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                    </div>
                </div>

                <div>
                    <label class="block text-xs text-slate-400">Date of Publication of Results</label>
                    <input type="text" id="inPubDate" value="19 July, 2018." class="w-full bg-slate-700 px-2 py-1.5 rounded text-white focus:outline-none focus:ring-1 focus:ring-amber-500" oninput="updateCertificate()">
                </div>
            </div>

            <button onclick="downloadPDF()" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded transition tracking-wide flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                হাই-কোয়ালিটি PDF ডাউনলোড
            </button>
        </div>

        <!-- ডান পাশে: লাইভ পারফেক্ট প্রিভিউ উইন্ডো -->
        <div class="lg:col-span-8 flex flex-col items-center overflow-x-auto bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl">
            <h2 class="text-sm font-bold text-slate-400 mb-2 self-start">২. লাইভ জেনারেটেড প্রিভিউ (ক্ষয়েরী কালার আপডেট)</h2>
            
            <div class="shadow-2xl origin-top scale-[0.65] xl:scale-[0.72] transform transition-transform duration-200 bg-white">
                <div id="certificateContainer" style="background-image: url('1.jpg');">
                    
                    <!-- ক্ষয়েরী নম্বরের লেয়ারসমূহ -->
                    <div id="txtSerial" class="absolute left-[225px] top-[207px] text-[18px] cert-number"></div>
                    <div id="txtDbchc" class="absolute left-[248px] top-[249px] text-[18px] cert-number"></div>
                    <div id="txtRegNo" class="absolute left-[785px] top-[207px] text-[18px] cert-number"></div>
                    
                    <!-- মূল বিবরণসমূহ (নিখুঁত কালো ও প্রোপার ফন্ট সাইজ) -->
                    <div id="txtName" class="absolute left-[365px] top-[392px] text-[23px] cert-text"></div>
                    <div id="txtFather" class="absolute left-[305px] top-[438px] text-[23px] cert-text"></div>
                    <div id="txtMother" class="absolute left-[175px] top-[483px] text-[23px] cert-text"></div>
                    <div id="txtCollege" class="absolute left-[155px] top-[529px] text-[23px] cert-text"></div>
                    
                    <div id="txtRoll" class="absolute left-[235px] top-[620px] text-[23px] cert-text"></div>
                    <div id="txtCenter" class="absolute left-[605px] top-[620px] text-[23px] cert-text"></div>
                    
                    <div id="txtGroup" class="absolute left-[605px] top-[667px] text-[23px] cert-text"></div>
                    <div id="txtGpa" class="absolute left-[182px] top-[715px] text-[22px] cert-normal"></div>
                    
                    <div id="txtPubDate" class="absolute left-[325px] top-[754px] text-[17px] cert-normal"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function updateCertificate() {
            document.getElementById('txtSerial').innerText = document.getElementById('inSerial').value;
            document.getElementById('txtRegNo').innerText = document.getElementById('inRegNo').value;
            document.getElementById('txtDbchc').innerText = document.getElementById('inDbchc').value;
            document.getElementById('txtName').innerText = document.getElementById('inName').value;
            document.getElementById('txtFather').innerText = document.getElementById('inFather').value;
            document.getElementById('txtMother').innerText = document.getElementById('inMother').value;
            document.getElementById('txtCollege').innerText = document.getElementById('inCollege').value;
            document.getElementById('txtRoll').innerText = document.getElementById('inRoll').value;
            document.getElementById('txtCenter').innerText = document.getElementById('inCenter').value;
            document.getElementById('txtGroup').innerText = document.getElementById('inGroup').value;
            document.getElementById('txtGpa').innerText = document.getElementById('inGpa').value;
            document.getElementById('txtPubDate').innerText = document.getElementById('inPubDate').value;
        }

        function loadBackground(event) {
            const container = document.getElementById('certificateContainer');
            if(event.target.files[0]) {
                const url = URL.createObjectURL(event.target.files[0]);
                container.style.backgroundImage = `url('${url}')`;
            }
        }

        function downloadPDF() {
            const element = document.getElementById('certificateContainer');
            const studentName = document.getElementById('inName').value.replace(/\s+/g, '_');
            
            const opt = {
                margin:       0,
                filename:     `HSC_Certificate_${studentName}.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'px', format: [1123, 794], orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save();
        }

        // ইনিশিয়াল ডাটা রান
        updateCertificate();
    </script>
</body>
</html>
