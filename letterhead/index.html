<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Business Letterhead Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h2>Letter Head Generator</h2>
            <label>Template Design</label>
            <select id="templateSelect">
                <option value="1">Design 1</option>
                <option value="2">Design 2</option>
            </select>
            <label>Company Name</label>
            <input type="text" id="companyName" placeholder="Company Name">
            <label>Tag Line</label>
            <input type="text" id="tagline" placeholder="Tag Line">
            <label>Mobile</label>
            <input type="text" id="mobile" placeholder="Mobile Number">
            <label>Address</label>
            <textarea id="address" placeholder="Address"></textarea>
            <button id="downloadPDF">Download PDF</button>
        </div>
        <div class="preview-area">
            <div id="letterhead" class="Design1">
                <div class="header">
                    <h1 id="companyPreview">Company Name</h1>
                    <p id="taglinePreview">Tag Line</p>
                </div>
                <div class="body"></div>
                <div class="footer">
                    <p id="addressPreview">Address</p>
                    <p id="mobilePreview">Mobile</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
