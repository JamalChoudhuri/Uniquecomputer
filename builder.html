<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্মার্ট সিভি ও কভার লেটার বিল্ডার ওয়ার্কস্পেস</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- html2pdf.js এবং এর ডিপেন্ডেন্সি লাইব্রেরিসমূহ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-100 text-gray-800 antialiased font-sans">

    <div class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold text-blue-400">🤖 প্রিমিয়াম সিভি ও কভার লেটার মেকার</h1>
        <a href="index.html" class="text-xs bg-slate-800 hover:bg-slate-700 text-white py-2 px-4 rounded border border-gray-700">⬅️ মূল পেজে ফিরুন</a>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <!-- টেমপ্লেট ও ওয়ার্কস্পেস কন্টেইনার -->
        <section class="bg-white p-6 rounded-xl shadow-xs border border-gray-200">
            <h2 id="galleryTitle" class="text-lg font-bold text-slate-900 mb-2 border-l-4 border-blue-500 pl-2">১. ডিজাইন দেখে আপনার পছন্দের টেমপ্লেট চয়েজ করুন (৫০টি থিম)</h2>
            
            <!-- টেমপ্লেট গ্রিড এরিয়া -->
            <div id="templateGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            
            <!-- রিসেট/অন্য ডিজাইন দেখার বাটন -->
            <button id="resetGalleryBtn" onclick="resetGallery()" class="hidden mb-4 bg-amber-600 hover:bg-amber-700 text-white text-xs font-bold py-2 px-4 rounded cursor-pointer">🔄 অন্য ডিজাইন পরিবর্তন করুন</button>
        </section>

        <!-- ২. এডিটিং প্যানেল -->
        <section id="workspaceSection" class="hidden">
            <div class="block lg:table w-full border-collapse">
                <div class="block lg:table-row">
                    
                    <!-- বাম পাশ: ডাটা এন্ট্রি ফর্ম ও টুলস -->
                    <div class="block lg:table-cell lg:w-5/12 bg-white p-6 rounded-xl shadow-xs border border-gray-200 vertical-align-top mb-6 lg:mb-0">
                        
                        <!-- কালার অপশন প্যালেট সুইচার -->
                        <div class="mb-6 p-4 bg-slate-50 rounded-lg border border-gray-200">
                            <h3 class="text-sm font-bold text-slate-900 mb-2">🎨 এই সিভির ডিজাইন কালার পরিবর্তন করুন:</h3>
                            <div class="flex flex-wrap gap-2.5" id="colorPickerContainer"></div>
                        </div>

                        <h2 class="text-sm font-bold text-slate-900 mb-4 border-l-4 border-emerald-500 pl-2">২. তথ্য পূরণ করুন (যা ফাকা রাখবেন তা সিভিতে আসবে না)</h2>
                        
                        <form id="smartForm" class="space-y-4" onsubmit="event.preventDefault();">
                            <!-- ছবি আপলোড -->
                            <div class="bg-slate-50 p-3 rounded border border-dashed border-gray-300 text-xs">
                                <label class="block font-semibold text-gray-700 mb-1">📸 প্রফেশনাল ছবি যোগ করুন</label>
                                <input type="file" id="userPhoto" accept="image/*" onchange="handlePhotoUpload(event)" class="w-full">
                            </div>

                            <!-- ডাইনামিক ফিল্ড কন্টেইনার -->
                            <div id="formFieldsContainer" class="space-y-4"></div>
                        </form>
                        
                        <!-- অ্যাকশন বাটনসমূহ -->
                        <div class="mt-6 space-y-3">
                            <button onclick="downloadDocument('cv')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md cursor-pointer text-sm text-center">⬇️ ডাউনলোড করুন: প্রিমিয়াম সিভি (PDF)</button>
                            <button onclick="downloadDocument('letter')" class="w-full bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-lg shadow-md cursor-pointer text-sm text-center">✉️ ডাউনলোড করুন: কভার লেটার (PDF)</button>
                        </div>
                    </div>

                    <!-- মিডল স্পেসার গ্যাপ -->
                    <div class="hidden lg:table-cell w-6"></div>

                    <!-- ডান পাশ: লাইভ প্রিভিউ ক্যানভাস -->
                    <div class="block lg:table-cell lg:w-7/12 bg-slate-300 p-4 md:p-6 rounded-xl shadow-inner vertical-align-top">
                        <div class="flex space-x-2 mb-4">
                            <button id="tabCvBtn" onclick="switchTab('cv')" class="px-4 py-2 bg-white text-blue-600 font-bold rounded-t-lg text-xs shadow-xs cursor-pointer">📄 লাইভ সিভি প্রিভিউ</button>
                            <button id="tabLetterBtn" onclick="switchTab('letter')" class="px-4 py-2 bg-gray-200 text-gray-600 font-medium rounded-t-lg text-xs shadow-xs cursor-pointer">✉️ লাইভ কভার লেটার</button>
                        </div>

                        <!-- ফাইনাল পেপার এরিয়া -->
                        <div class="bg-white p-2 rounded shadow-md overflow-x-auto">
                            <!-- ডাউনলোডের সমস্যা দূর করতে ফিক্সড কনফিগারেশন এরিয়া -->
                            <div id="pdfWrapper" style="background: white; width: 100%; min-width: 650px;">
                                <div id="cvCanvas" class="bg-white p-8 mx-auto" style="width: 100%; min-height: 880px; box-sizing: border-box;"></div>
                                <div id="letterCanvas" class="hidden bg-white p-8 mx-auto" style="width: 100%; min-height: 880px; box-sizing: border-box;"></div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
