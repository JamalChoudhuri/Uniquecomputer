<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50+ Unique Premium CV & Cover Letter Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; }
        }
        /* স্ক্রিন প্রিভিউ স্ক্রোল ঠিক রাখার জন্য ফিক্সড হাইট */
        .preview-box { max-height: 820px; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased font-sans">

    <div class="bg-slate-950 text-white p-4 flex justify-between items-center shadow-lg no-print">
        <h1 class="text-xl font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">💎 PRO CV & COVER LETTER ENGINE v2.0</h1>
        <a href="index.html" class="text-xs font-semibold bg-slate-800 hover:bg-slate-700 text-white py-2 px-4 rounded border border-slate-700 transition">⬅️ Main Gallery</a>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <!-- ৫০টি ভিন্ন ভিন্ন সিভির প্রিমিয়াম গ্যালারি -->
        <section class="bg-white p-6 rounded-2xl shadow-xs border border-slate-200 no-print">
            <h2 id="galleryTitle" class="text-lg font-bold text-slate-900 mb-6 border-l-4 border-cyan-500 pl-3">১. নিচে ৫০টি সম্পূর্ণ ভিন্ন ও প্রিমিয়াম ডিজাইন রয়েছে, আপনার পছন্দটি বেছে নিন:</h2>
            
            <div id="templateGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            
            <button id="resetGalleryBtn" onclick="resetGallery()" class="hidden mt-6 bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold py-2.5 px-5 rounded-lg transition shadow-md cursor-pointer">🔄 অন্য ডিজাইন চয়েজ করুন (Change Layout)</button>
        </section>

        <!-- মূল ওয়ার্কস্পেস প্যানেল -->
        <section id="workspaceSection" class="hidden no-print">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <!-- বাম পাশ: ডাটা এন্ট্রি ও এডিটিং ফর্ম -->
                <div class="lg:col-span-5 bg-white p-6 rounded-2xl shadow-xs border border-slate-200 space-y-6 max-h-[900px] overflow-y-auto">
                    
                    <!-- কভার লেটার এডিট করার এক্সক্লুসিভ জোন -->
                    <div class="p-4 bg-amber-50 rounded-xl border border-amber-200">
                        <h3 class="text-xs font-bold text-amber-900 mb-2">✉️ কভার লেটার এডিটর (Edit Cover Letter Body)</h3>
                        <textarea id="inp_coverLetterBody" oninput="updateLivePreviews()" rows="5" class="w-full p-2 text-xs border border-amber-300 rounded bg-white text-slate-800 focus:outline-amber-500" placeholder="এখানে আপনার কভার লেটারের ভেতরের কথাগুলো এডিট করুন..."></textarea>
                    </div>

                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <h3 class="text-xs font-bold text-slate-900 mb-2">🎨 কাস্টম কালার সোয়াচ:</h3>
                        <div class="flex flex-wrap gap-2" id="colorPickerContainer"></div>
                    </div>

                    <form id="smartForm" class="space-y-4" onsubmit="event.preventDefault();">
                        <div class="bg-slate-50 p-4 rounded-xl border border-dashed border-slate-300 text-xs">
                            <label class="block font-semibold text-slate-700 mb-1">📸 প্রোফাইল ছবি আপলোড (Optional)</label>
                            <input type="file" id="userPhoto" accept="image/*" onchange="handlePhotoUpload(event)" class="w-full">
                        </div>
                        <div id="formFieldsContainer" class="space-y-4"></div>
                    </form>
                    
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <button onclick="downloadPDF('cv')" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition text-xs text-center cursor-pointer">📄 CV ডাউনলোড করুন</button>
                        <button onclick="downloadPDF('letter')" class="bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-800 hover:to-slate-900 text-white font-bold py-3 px-4 rounded-xl shadow-md transition text-xs text-center cursor-pointer">✉️ কভার লেটার ডাউনলোড</button>
                    </div>
                </div>

                <!-- ডান পাশ: লাইভ প্রিভিউ বোর্ড -->
                <div class="lg:col-span-7 bg-slate-200 p-4 rounded-2xl shadow-inner">
                    <div class="flex space-x-2 mb-3">
                        <button id="tabCvBtn" onclick="switchTab('cv')" class="px-4 py-2 bg-white text-blue-600 font-bold rounded-t-xl text-xs shadow-xs cursor-pointer">📄 সিভির লাইভ রূপ</button>
                        <button id="tabLetterBtn" onclick="switchTab('letter')" class="px-4 py-2 bg-gray-300 text-gray-600 font-medium rounded-t-xl text-xs shadow-xs cursor-pointer">✉️ ম্যাচিং কভার লেটার</button>
                    </div>

                    <div class="bg-white p-2 rounded-xl shadow-md flex justify-center preview-box">
                        <!-- রিয়েল সাইজ A4 কন্টেইনার -->
                        <div id="printArea" class="bg-white" style="width: 210mm; min-height: 297mm; padding: 15mm; box-sizing: border-box;">
                            <div id="cvCanvas"></div>
                            <div id="letterCanvas" class="hidden"></div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
