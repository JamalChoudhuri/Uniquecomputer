<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50+ Premium Visual CV & Cover Letter Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* প্রিন্ট করার সময় ইউআরএল, টাইম ও ফুটার রিমোভ করার সুরক্ষিত উপায় */
        @page {
            size: A4;
            margin: 10mm 12mm; /* হেডার ও ফুটার বাদ দিয়ে কন্টেন্টকে চারপাশ থেকে মার্জিন দেবে */
        }
        @media print {
            /* মেইন উইন্ডো ছাড়া বাকি সবকিছু হাইড করা হবে */
            body {
                background: #ffffff !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print {
                display: none !important;
            }
            /* প্রিভিউ বক্সের স্ক্রলবার প্রিন্ট হবে না */
            .preview-box {
                max-height: none !important;
                overflow: visible !important;
            }
            #printArea {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
            }
        }
        .preview-box { max-height: 850px; overflow-y: auto; }
        
        /* গ্যালারির মিনি-ভিজ্যুয়াল প্রিভিউ কার্ড */
        .mini-preview-card {
            height: 140px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            background: #fff;
            position: relative;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased font-sans">

    <div class="bg-slate-950 text-white p-4 flex justify-between items-center shadow-lg no-print">
        <h1 class="text-xl font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">💎 PRESTIGE CV ENGINE v4.1</h1>
        <a href="index.html" class="text-xs font-semibold bg-slate-800 hover:bg-slate-700 text-white py-2 px-4 rounded border border-slate-700 transition">⬅️ Gallery</a>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <!-- ৫০টি রিয়েল ভিজ্যুয়াল প্রিভিউসহ গ্যালারি -->
        <section class="bg-white p-6 rounded-2xl shadow-xs border border-slate-200 no-print">
            <h2 id="galleryTitle" class="text-sm font-bold text-slate-900 mb-6 border-l-4 border-cyan-500 pl-3">১. নিচে ৫০টি সম্পূর্ণ ভিন্ন ভিজ্যুয়াল ডিজাইন দেওয়া হলো। আপনার পছন্দের ডিজাইনটির উপর ক্লিক করুন:</h2>
            <div id="templateGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            <button id="resetGalleryBtn" onclick="resetGallery()" class="hidden mt-6 bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold py-2.5 px-5 rounded-lg transition shadow-md cursor-pointer">🔄 অন্য ডিজাইন পছন্দ করুন (Change Layout)</button>
        </section>

        <!-- মূল ওয়ার্কস্পেস প্যানেল -->
        <section id="workspaceSection" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <!-- বাম পাশ: ডাটা ইনপুট ও কালার প্যালেট (প্রিন্টে হাইড হবে) -->
                <div class="lg:col-span-5 bg-white p-6 rounded-2xl shadow-xs border border-slate-200 space-y-6 max-h-[900px] overflow-y-auto no-print">
                    
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <h3 class="text-xs font-bold text-slate-900 mb-2">🎨 কালার চেঞ্জার (রং পরিবর্তন করুন):</h3>
                        <div class="flex flex-wrap gap-2" id="colorPickerContainer"></div>
                    </div>

                    <div class="p-4 bg-amber-50 rounded-xl border border-amber-200">
                        <h3 class="text-xs font-bold text-amber-900 mb-2">✉️ কভার লেটার লাইভ এডিটর (Edit Content)</h3>
                        <textarea id="inp_coverLetterBody" oninput="updateLivePreviews()" rows="5" class="w-full p-2 text-xs border border-amber-300 rounded bg-white text-slate-800 focus:outline-amber-500"></textarea>
                    </div>

                    <form id="smartForm" class="space-y-4" onsubmit="event.preventDefault();">
                        <div class="bg-slate-50 p-4 rounded-xl border border-dashed border-slate-300 text-xs">
                            <label class="block font-semibold text-slate-700 mb-1">📸 প্রোফাইল ছবি সংযুক্ত করুন</label>
                            <input type="file" id="userPhoto" accept="image/*" onchange="handlePhotoUpload(event)" class="w-full">
                        </div>
                        <div id="formFieldsContainer" class="space-y-4"></div>
                    </form>
                    
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <button onclick="downloadPDF('cv')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition text-xs text-center cursor-pointer">📄 CV প্রিন্ট / PDF ডাউনলোড</button>
                        <button onclick="downloadPDF('letter')" class="bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-xl shadow-md transition text-xs text-center cursor-pointer">✉️ কভার লেটার ডাউনলোড</button>
                    </div>
                </div>

                <!-- ডান পাশ: নিখুঁত A4 পেপার প্রিভিউ -->
                <div class="lg:col-span-7 bg-slate-200 p-4 rounded-2xl shadow-inner print:p-0 print:bg-white">
                    <div class="flex space-x-2 mb-3 no-print">
                        <button id="tabCvBtn" onclick="switchTab('cv')" class="px-4 py-2 bg-white text-blue-600 font-bold rounded-t-xl text-xs shadow-xs cursor-pointer">📄 সিভির এডিটেবল লাইভ রূপ</button>
                        <button id="tabLetterBtn" onclick="switchTab('letter')" class="px-4 py-2 bg-gray-300 text-gray-600 font-medium rounded-t-xl text-xs shadow-xs cursor-pointer">✉️ কভার লেটার রূপ</button>
                    </div>

                    <div class="bg-white p-2 rounded-xl shadow-md flex justify-center preview-box print:shadow-none print:p-0">
                        <!-- রিয়েল সাইজ A4 কন্টেইনার -->
                        <div id="printArea" class="bg-white" style="width: 210mm; min-height: 297mm; padding: 15mm; box-sizing: border-box;">
                            <div id="cvCanvas"></div>
                            <div id="letterCanvas" class="hidden"></div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
