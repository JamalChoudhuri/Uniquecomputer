<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium CV & Cover Letter Builder</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* প্রিন্ট ফ্রেন্ডলি ফিক্সড কনফিগারেশন */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
        }
        .mini-preview { font-size: 5px; line-height: 1.2; transform: scale(1); }
    </style>
</head>
<body class="bg-slate-100 text-gray-800 antialiased">

    <div class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md no-print">
        <h1 class="text-xl font-bold text-blue-400">🤖 Premium CV & Cover Letter Maker</h1>
        <a href="index.html" class="text-xs bg-slate-800 hover:bg-slate-700 text-white py-2 px-4 rounded border border-gray-700">⬅️ Main Page</a>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <!-- টেমপ্লেট সিলেকশন এরিয়া -->
        <section class="bg-white p-6 rounded-xl shadow-xs border border-gray-200 no-print">
            <h2 id="galleryTitle" class="text-lg font-bold text-slate-900 mb-6 border-l-4 border-blue-500 pl-2">Choose Your Professional Template (50 Themes Available)</h2>
            
            <div id="templateGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            
            <button id="resetGalleryBtn" onclick="resetGallery()" class="hidden mt-6 bg-amber-600 hover:bg-amber-700 text-white text-xs font-bold py-2 px-4 rounded cursor-pointer">🔄 Change Template Design</button>
        </section>

        <!-- ওয়ার্কস্পেস ও এডিটিং প্যানেল -->
        <section id="workspaceSection" class="hidden no-print">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <!-- বাম পাশ: ডাটা এন্ট্রি ফর্ম -->
                <div class="lg:col-span-5 bg-white p-6 rounded-xl shadow-xs border border-gray-200 space-y-6">
                    <div class="p-4 bg-slate-50 rounded-lg border border-gray-200">
                        <h3 class="text-sm font-bold text-slate-900 mb-2">重新🎨 Customize Theme Colors:</h3>
                        <div class="flex flex-wrap gap-2.5" id="colorPickerContainer"></div>
                    </div>

                    <form id="smartForm" class="space-y-4" onsubmit="event.preventDefault();">
                        <div class="bg-slate-50 p-3 rounded border border-dashed border-gray-300 text-xs">
                            <label class="block font-semibold text-gray-700 mb-1">📸 Profile Photo</label>
                            <input type="file" id="userPhoto" accept="image/*" onchange="handlePhotoUpload(event)">
                        </div>
                        <div id="formFieldsContainer" class="space-y-4"></div>
                    </form>
                    
                    <div class="space-y-3">
                        <button onclick="downloadPDF('cv')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md cursor-pointer text-sm">⬇️ Save CV as PDF</button>
                        <button onclick="downloadPDF('letter')" class="w-full bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-lg shadow-md cursor-pointer text-sm">✉️ Save Cover Letter as PDF</button>
                    </div>
                </div>

                <!-- ডান পাশ: লাইভ প্রিভিউ -->
                <div class="lg:col-span-7 bg-slate-300 p-4 rounded-xl shadow-inner">
                    <div class="flex space-x-2 mb-4">
                        <button id="tabCvBtn" onclick="switchTab('cv')" class="px-4 py-2 bg-white text-blue-600 font-bold rounded-t-lg text-xs shadow-xs cursor-pointer">📄 CV Live Preview</button>
                        <button id="tabLetterBtn" onclick="switchTab('letter')" class="px-4 py-2 bg-gray-200 text-gray-600 font-medium rounded-t-lg text-xs shadow-xs cursor-pointer">✉️ Matching Cover Letter</button>
                    </div>

                    <div class="bg-white p-4 rounded shadow-md overflow-x-auto flex justify-center">
                        <!-- প্রিন্ট করার জন্য নির্ধারিত এরিয়া -->
                        <div id="printArea" class="bg-white shadow-lg" style="width: 210mm; min-height: 297mm; padding: 20mm; box-sizing: border-box;">
                            <div id="cvCanvas"></div>
                            <div id="letterCanvas" class="hidden"></div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
